name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

env:
  DAGGER_VERSION: 0.20.8
  STATIC_SITE_MODULE: github.com/riftonix/daggerverse/scenarios/static-site@scenarios/static-site/v0.1.0
  SITE_DIR: .
  SITE_BASE_URL: https://riftonix.io/
  SITE_OUTPUT_DIR: public

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        if: ${{ !env.ACT }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Dagger
        if: ${{ !env.ACT }}
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Use current directory for local act source
        if: ${{ env.ACT }}
        run: |
          ACT_CWD=$(readlink /proc/$(pgrep -u $(id -u) -x act | head -n 1)/cwd)
          echo "Detected local source: $ACT_CWD"
          printf 'SITE_DIR=%s\n' "$ACT_CWD" >> "$GITHUB_ENV"

      - name: Verify site with Dagger static-site scenario
        run: |
          dagger --progress=plain -m "$STATIC_SITE_MODULE" call verify-site \
            --site="$SITE_DIR" \
            --site-base-url="$SITE_BASE_URL" \
            --engine=hugo

  preview:
    name: Preview
    if: ${{ github.event_name == 'pull_request' || github.event.act }}
    runs-on: ubuntu-latest
    needs:
      - verify
    permissions:
      contents: read
    concurrency:
      group: preview-${{ github.event.pull_request.number || 0 }}
      cancel-in-progress: true
    env:
      PREVIEW_ID: ${{ github.event.pull_request.number || 0 }}
      SITE_BASE_URL: https://riftonix.io/${{ github.event.pull_request.number || 0 }}/
      SITE_OUTPUT_DIR: preview/${{ github.event.pull_request.number || 0 }}

    steps:
      - name: Check out repository
        if: ${{ !env.ACT }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Dagger
        if: ${{ !env.ACT }}
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Use current directory for local act source
        if: ${{ env.ACT }}
        run: |
          ACT_CWD=$(readlink /proc/$(pgrep -u $(id -u) -x act | head -n 1)/cwd)
          echo "Detected local source: $ACT_CWD"
          printf 'SITE_DIR=%s\n' "$ACT_CWD" >> "$GITHUB_ENV"

      - name: Render preview with Dagger static-site scenario
        run: |
          dagger --progress=plain -m "$STATIC_SITE_MODULE" call render-site \
            --site="$SITE_DIR" \
            --site-base-url="$SITE_BASE_URL" \
            --engine=hugo \
            --output="$SITE_OUTPUT_DIR"

      - name: Upload preview artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: preview-${{ env.PREVIEW_ID }}
          path: ${{ env.SITE_OUTPUT_DIR }}
          if-no-files-found: error
          overwrite: true

  publish:
    name: Publish
    if: ${{ github.event_name == 'push' || github.event.act }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages-production
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        if: ${{ !env.ACT }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up Dagger
        if: ${{ !env.ACT }}
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Use current directory for local act source
        if: ${{ env.ACT }}
        run: |
          ACT_CWD=$(readlink /proc/$(pgrep -u $(id -u) -x act | head -n 1)/cwd)
          echo "Detected local source: $ACT_CWD"
          printf 'SITE_DIR=%s\n' "$ACT_CWD" >> "$GITHUB_ENV"

      - name: Render production with Dagger static-site scenario
        run: |
          dagger --progress=plain -m "$STATIC_SITE_MODULE" call render-site \
            --site="$SITE_DIR" \
            --site-base-url="$SITE_BASE_URL" \
            --engine=hugo \
            --output="$SITE_OUTPUT_DIR"
          printf 'riftonix.io\n' > "$SITE_OUTPUT_DIR/CNAME"

      - name: Configure Pages
        if: ${{ !env.ACT }}
        uses: actions/configure-pages@v5

      - name: Upload production Pages artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.SITE_OUTPUT_DIR }}

      - name: Deploy production to Pages
        if: ${{ !env.ACT }}
        id: deployment
        uses: actions/deploy-pages@v4

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest

    steps:
      - name: Mark CI as passed
        run: |
          # This status is intentionally always green for pull requests.
          true
