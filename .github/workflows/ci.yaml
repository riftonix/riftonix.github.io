name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    branches:
      - master

permissions:
  contents: read

env:
  DAGGER_VERSION: 0.20.8
  STATIC_SITE_MODULE: github.com/riftonix/daggerverse/scenarios/static-site@scenarios/static-site/v0.2.0
  HUGO_THEME_URL: github.com/google/docsy@v0.15.0
  SITE_DIR: .
  SITE_BASE_URL: https://riftonix.io/
  SITE_OUTPUT_DIR: public

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        if: ${{ !env.ACT }}
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Dagger
        if: ${{ !env.ACT }}
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Use current directory for local act source
        if: ${{ env.ACT }}
        run: |
          ACT_CWD=$(readlink /proc/$(pgrep -u $(id -u) -x act | head -n 1)/cwd)
          echo "Detected local source: $ACT_CWD"
          printf 'SITE_DIR=%s\n' "$ACT_CWD" >> "$GITHUB_ENV"

      - name: Verify site with Dagger static-site scenario
        run: |
          dagger --progress=plain -m "$STATIC_SITE_MODULE" call \
            --source="$SITE_DIR" \
            --hugo-theme-url="$HUGO_THEME_URL" \
            verify-site \
            --site-base-url="$SITE_BASE_URL" \
            --engine=hugo

  preview:
    name: Preview
    if: ${{ always() && (github.event.act || (github.event_name == 'pull_request' && (github.event.action == 'closed' || needs.verify.result == 'success'))) }}
    runs-on: ubuntu-latest
    needs:
      - verify
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: preview-${{ github.event.pull_request.number || 0 }}
      cancel-in-progress: true
    env:
      PREVIEW_ID: ${{ github.event.pull_request.number || 0 }}
      SITE_BASE_URL: https://riftonix.io/pr-preview/pr-${{ github.event.pull_request.number || 0 }}/
      SITE_OUTPUT_DIR: public-preview

    steps:
      - name: Check out repository
        if: ${{ !env.ACT }}
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.action == 'closed' && github.event.pull_request.base.sha || github.event.pull_request.head.sha }}

      - name: Set up Dagger
        if: ${{ !env.ACT && github.event.action != 'closed' }}
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Use current directory for local act source and output
        if: ${{ env.ACT && github.event.action != 'closed' }}
        run: |
          ACT_CWD=$(readlink /proc/$(pgrep -u $(id -u) -x act | head -n 1)/cwd)
          echo "Detected local source: $ACT_CWD"
          printf 'SITE_DIR=%s\n' "$ACT_CWD" >> "$GITHUB_ENV"
          printf 'SITE_OUTPUT_DIR=%s/public-preview-%s\n' "$ACT_CWD" "$PREVIEW_ID" >> "$GITHUB_ENV"

      - name: Render preview with Dagger static-site scenario
        if: ${{ github.event.action != 'closed' }}
        run: |
          dagger --progress=plain -m "$STATIC_SITE_MODULE" call \
            --source="$SITE_DIR" \
            --hugo-theme-url="$HUGO_THEME_URL" \
            render-site \
            --site-base-url="$SITE_BASE_URL" \
            --engine=hugo \
            --output="$SITE_OUTPUT_DIR"

      - name: Add GitHub Pages preview markers
        if: ${{ github.event.action != 'closed' }}
        run: |
          mkdir -p "$RUNNER_TEMP/pages-root-markers"
          touch "$RUNNER_TEMP/pages-root-markers/.nojekyll"
          printf 'riftonix.io\n' > "$RUNNER_TEMP/pages-root-markers/CNAME"

      - name: Deploy GitHub Pages root markers
        if: ${{ !env.ACT && github.event.action != 'closed' }}
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: ${{ runner.temp }}/pages-root-markers
          clean: false
          force: false

      - name: Deploy pull request preview
        if: ${{ !env.ACT }}
        uses: rossjrw/pr-preview-action@v1.8.1
        with:
          source-dir: ${{ env.SITE_OUTPUT_DIR }}
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          pr-number: ${{ env.PREVIEW_ID }}
          pages-base-url: riftonix.io
          action: auto
          qr-code: false

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - verify
      - preview
    if: ${{ always() }}

    steps:
      - name: Check CI jobs
        env:
          VERIFY_RESULT: ${{ needs.verify.result }}
          PREVIEW_RESULT: ${{ needs.preview.result }}
        run: |
          test "$VERIFY_RESULT" = success
          test "$PREVIEW_RESULT" = success || test "$PREVIEW_RESULT" = skipped
